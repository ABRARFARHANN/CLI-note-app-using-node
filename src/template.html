<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --bg-accent: #e7efe9;
        --panel: rgba(255, 255, 255, 0.78);
        --panel-border: rgba(43, 38, 34, 0.1);
        --text: #1f1a17;
        --muted: #6d6259;
        --accent: #c35d2e;
        --accent-soft: rgba(195, 93, 46, 0.12);
        --shadow: 0 20px 60px rgba(44, 31, 22, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family:
          "Avenir Next", "Avenir", "Gill Sans", "Trebuchet MS", sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top left,
            rgba(195, 93, 46, 0.2),
            transparent 28%
          ),
          radial-gradient(
            circle at right center,
            rgba(122, 160, 138, 0.18),
            transparent 24%
          ),
          linear-gradient(135deg, var(--bg), var(--bg-accent));
      }

      .shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }

      .hero {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 28px;
      }

      .eyebrow {
        width: fit-content;
        padding: 6px 12px;
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .subtitle {
        max-width: 56ch;
        margin: 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.6;
      }

      .panel {
        padding: 22px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .notes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
      }

      .note {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 180px;
        padding: 18px;
        border: 1px solid rgba(43, 38, 34, 0.08);
        border-radius: 22px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96),
          rgba(250, 245, 238, 0.92)
        );
        box-shadow: 0 10px 24px rgba(44, 31, 22, 0.08);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
      }

      .note:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 30px rgba(44, 31, 22, 0.12);
      }

      .note p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: auto;
      }

      .tag {
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 700;
      }

      @media (max-width: 640px) {
        .shell {
          padding: 28px 16px 44px;
        }

        .panel {
          padding: 16px;
          border-radius: 22px;
        }

        .notes {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <span class="eyebrow">remno </span>
        <h1>Notes.</h1>
        <p class="subtitle">Your saved notes</p>
      </section>

      <section class="panel">
        <div class="notes">{{notes}}</div>
      </section>
    </main>
  </body>
</html>
